<!DOCTYPE html>
<html>
<head>
  <title>Research | Patricia Bishop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --olive: #A1814D;
      --paper: #D9C8AB;
      --clay: #9E5C3E;
      --ink: #1f241c;
      --cream: #fbf7ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    .top {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 10;
  padding: 28px 36px;
}

    .top a {
  color: rgba(31,36,28,.75);
  text-decoration: none;
  font-family: Arial, sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 11px;
  transition: all .2s ease;
}

    .top a:hover {
  color: rgba(31,36,28,1);
}
    .top-title {
      font-family: Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 12px;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .panel {
      position: relative;
      min-height: 100vh;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(20, 22, 18, 0.38);
      transition: background 0.25s ease;
    }

    .panel:hover::before {
      background: rgba(20, 22, 18, 0.18);
    }

    .panel-title {
      position: relative;
      z-index: 2;
      font-size: clamp(42px, 6vw, 82px);
      font-weight: normal;
      line-height: 0.95;
      text-align: center;
      max-width: 500px;
      padding: 24px;
    }

    .panel-label {
  position: absolute;
  bottom: 42px;
  left: 42px;
  z-index: 2;
  font-family: Arial, sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 16px;
  font-weight: 500;
  color: rgba(255,255,255,0.95);
}

    .alosine {
      background-image: url("alosine.jpg");
    }

    .saltmarsh {
      background-image: url("saltmarsh.jpg");
    }

    @media (max-width: 850px) {
      main {
        grid-template-columns: 1fr;
      }

      .panel {
        min-height: 50vh;
      }

      .top {
        padding: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="top">
  <a href="index.html">← Patricia Bishop</a>
</div>

  <main>
    <a class="panel alosine" href="alosine.html">
      <div class="panel-title">Alosine<br>Ecology</div>
      <div class="panel-label">Lab Research</div>
    </a>

    <a class="panel saltmarsh" href="saltmarsh.html">
      <div class="panel-title">Salt Marsh<br>Restoration</div>
      <div class="panel-label">Fieldwork</div>
    </a>
  </main>

</body>
</html>
